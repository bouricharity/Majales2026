<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>دليل المجالس - الصور</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --ink: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 10px 25px rgba(0,0,0,.06);
      --shadow2: 0 4px 12px rgba(0,0,0,.06);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, "Noto Kufi Arabic", "Noto Sans Arabic", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(243,244,246,.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 14px;
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
    }
    .title {
      display:flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .search {
      display:flex;
      gap: 10px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 12px;
      box-shadow: var(--shadow2);
    }
    .search input {
      border: 0;
      outline: none;
      font-size: 14px;
      width: 100%;
      background: transparent;
      color: var(--ink);
    }
    .search .hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .filters {
      display:flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 6px;
      -webkit-overflow-scrolling: touch;
    }
    .chip {
      border: 1px solid var(--border);
      background: var(--card);
      padding: 9px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      box-shadow: var(--shadow2);
      user-select: none;
      transition: transform .04s ease;
    }
    .chip:active { transform: scale(.98); }
    .chip[data-active="true"] {
      border-color: #111827;
      box-shadow: 0 0 0 2px rgba(17,24,39,.08), var(--shadow2);
      font-weight: 700;
    }

    main .wrap {
      padding-top: 18px;
      padding-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .cardhead {
      padding: 12px 14px 10px 14px;
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
    }
    .meta {
      display:flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .name {
      font-size: 14px;
      font-weight: 800;
      margin: 0;
      line-height: 1.3;
      word-break: break-word;
    }
    .sub {
      font-size: 12px;
      color: var(--muted);
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      padding: 4px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fafafa;
    }
    .actions {
      display:flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .btn {
      border: 1px solid var(--border);
      background: #111827;
      color: #fff;
      padding: 9px 10px;
      border-radius: 10px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: var(--shadow2);
      text-decoration: none;
      display:inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn.secondary {
      background: #fff;
      color: var(--ink);
    }
    .imgwrap {
      background: #fff;
      padding: 10px;
    }
    .img {
      width: 100%;
      height: auto;
      display:block;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .empty {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px 14px;
      color: var(--muted);
      text-align: center;
    }

    /* Desktop */
    @media (min-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
      }
      .controls {
        grid-template-columns: 1.2fr .8fr;
        align-items: center;
      }
      .filters {
        justify-content: flex-start;
      }
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* "PDF-like" feel: cards like pages */
    .pagefeel {
      background: #fff;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 10px;
    }
    .footer {
      padding: 10px 0 0 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topbar">
        <div class="title">
          <h1>دليل المجالس (صور منفصلة)</h1>
          <div class="count" id="countLabel"></div>
        </div>

        <div class="controls">
          <div class="search" role="search">
            <input id="q" type="search" placeholder="بحث عام: اكتب اسم المجلس أو رقم المجمع أو رقم البيت…" autocomplete="off" />
            <span class="hint">مثال: 754 أو 271</span>
          </div>

          <div class="filters" id="filters" aria-label="تصفية حسب رقم المجمع"></div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="grid" id="grid"></div>
      <div class="footer">يمكنك البحث أو اختيار رقم مجمع للتنقل بسرعة.</div>
    </div>

    const blocks = Array.from(new Set(MAJLES.map(x => x.block))).sort((a,b) => a-b);

    const state = {

    const elFilters = document.getElementById("filters");
    const elGrid = document.getElementById("grid");
    const elQ = document.getElementById("q");
    const elCount = document.getElementById("countLabel");

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function setActiveChip() {
      [...elFilters.querySelectorAll(".chip")].forEach(ch => {
        ch.dataset.active = (ch.dataset.value === String(state.block)) ? "true" : "false";
      });
    }

    function renderFilters() {
      const chips = [];
      chips.push(`<div class="chip" data-value="all" data-active="true">الكل</div>`);
      blocks.forEach(b => {
        chips.push(`<div class="chip" data-value="${b}">مجمع ${b}</div>`);
      });
      elFilters.innerHTML = chips.join("");
      elFilters.addEventListener("click", (e) => {
        const chip = e.target.closest(".chip");
        if (!chip) return;
        state.block = chip.dataset.value;
        setActiveChip();
        render();
        // على الموبايل: أرجع للأعلى بعد اختيار فلتر
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }

      if (state.block !== "all" && String(item.block) !== String(state.block)) return false;
      const q = state.q.trim().toLowerCase();
      if (!q) return true;

      const hay = [
        item.name,
        String(item.block),
        String(item.house)
      ].join(" ").toLowerCase();

      return hay.includes(q);
    }

    function render() {
      const filtered = MAJLES.filter(matches);

      elCount.textContent = `المعروض: ${filtered.length} / ${MAJLES.length}`;

      if (filtered.length === 0) {
        elGrid.innerHTML = `<div class="empty">لا توجد نتائج مطابقة. جرّب كلمة أخرى أو ألغِ الفلتر.</div>`;
        return;
      }

      elGrid.innerHTML = filtered.map(item => {
        const name = escapeHtml(item.name);
        return `
          <section class="card" aria-label="${name}">
            <div class="cardhead">
              <div class="meta">
                <p class="name">${name}</p>
                <div class="sub">
                  <span class="badge">المجمع: ${item.block}</span>
                  <span class="badge">البيت: ${escapeHtml(item.house)}</span>
                </div>
              </div>
              <div class="actions">
                <a class="btn secondary" href="${item.image}" target="_blank" rel="noopener">فتح الصورة</a>
              </div>
            </div>
            <div class="imgwrap">
              <img class="img" loading="lazy" src="${item.image}" alt="${name}" />
            </div>
          </section>
        `;
      }).join("");
    }

    elQ.addEventListener("input", () => {
      state.q = elQ.value;
      render();
    });

    // اختصار لوحة مفاتيح: /
    window.addEventListener("keydown", (e) => {
      if (e.key === "/" && document.activeElement !== elQ) {
        e.preventDefault();
        elQ.focus();
      }
      if (e.key === "Escape") {
        elQ.value = "";
        state.q = "";
        render();
      }
    });

    renderFilters();
    render();
  </script>
</body>
</html>
